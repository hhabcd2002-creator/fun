<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise - Smart Search</title>
    <style>
        :root {
            --dreamy-blue: #a1c4fd;
            --creamy-white: #fff9f0;
            --glass: rgba(255, 255, 255, 0.4);
            --text-blue: #5a73a3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #fff9f0 100%);
            height: 100vh; color: #444; overflow: hidden;
        }

        /* Dashboards */
        #coin-display { position: fixed; top: 15px; right: 15px; background: var(--glass); padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #b8860b; border: 1px solid white; backdrop-filter: blur(10px); z-index: 1000; }

        /* Search & Suggestions UI */
        .search-container { position: relative; width: 100%; max-width: 500px; margin: 20px auto; }
        
        input { padding: 15px; border-radius: 25px; border: 1px solid #ddd; width: 100%; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        #suggestions-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; border-radius: 15px; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 250px; overflow-y: auto; z-index: 2000;
            display: none; list-style: none;
        }

        #suggestions-list li {
            padding: 12px 20px; cursor: pointer; text-align: left;
            border-bottom: 1px solid #f0f0f0; transition: 0.2s;
        }

        #suggestions-list li:hover { background: #f8f9fa; color: var(--text-blue); }

        /* Video Area */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; margin-top: 20px; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .section { width: 95%; max-width: 700px; margin: 60px auto; text-align: center; }
        button { padding: 12px 25px; border-radius: 25px; border: none; background: var(--text-blue); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #popup-box { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.5s; z-index: 9000; font-weight: bold; color: #2ecc71; border: 2px solid #2ecc71; }
        #popup-box.show { top: 30px; }
    </style>
</head>
<body>

    <div id="popup-box"></div>
    <div id="coin-display">✨🪙 Gold: <span id="coin-val">0</span></div>

    <div class="section">
        <h1>Paradise Music</h1>
        <p style="margin-bottom: 20px;">YouTube မှာပေါ်သလို အကြံပြုချက်များဖြင့် ရှာဖွေပါ</p>

        <div class="search-container">
            <input type="text" id="yt-search" placeholder="သီချင်းအမည်ရိုက်ပါ..." autocomplete="off">
            <ul id="suggestions-list"></ul>
            <button onclick="searchYT()">Search Now</button>
        </div>

        <div class="video-wrapper">
            <iframe id="player" src="https://www.youtube.com/embed?enablejsapi=1&listType=search&list=relaxing+music"></iframe>
        </div>
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('p_gold')) || 0;
        const searchInput = document.getElementById('yt-search');
        const suggestionsList = document.getElementById('suggestions-list');

        function updateUI() { document.getElementById('coin-val').innerText = coins; localStorage.setItem('p_gold', coins); }
        function showPopup(msg) {
            const p = document.getElementById('popup-box');
            p.innerText = msg; p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 3000);
        }

        // YouTube Suggestion API Logic
        searchInput.addEventListener('input', function() {
            const query = this.value;
            if (query.length < 2) {
                suggestionsList.style.display = 'none';
                return;
            }

            // Google Search Suggestion API ကို JSONP ဖြင့် ခေါ်ယူခြင်း
            const script = document.createElement('script');
            script.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(query)}&callback=handleSuggestions`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        });

        // API ကနေ ပြန်လာတဲ့ အချက်အလက်တွေကို List ထဲ ထည့်ခြင်း
        window.handleSuggestions = function(data) {
            const suggestions = data[1];
            suggestionsList.innerHTML = '';
            
            if (suggestions.length > 0) {
                suggestionsList.style.display = 'block';
                suggestions.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item[0];
                    li.onclick = function() {
                        searchInput.value = item[0];
                        suggestionsList.style.display = 'none';
                        searchYT();
                    };
                    suggestionsList.appendChild(li);
                });
            } else {
                suggestionsList.style.display = 'none';
            }
        };

        // အပြင်ဘက်ကို နှိပ်ရင် Suggestion List ပိတ်အောင်လုပ်ခြင်း
        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) suggestionsList.style.display = 'none';
        });

        function searchYT() {
            let q = searchInput.value;
            if(!q) return;
            let origin = window.location.origin;
            document.getElementById('player').src = `https://www.youtube.com/embed?enablejsapi=1&origin=${origin}&listType=search&list=${encodeURIComponent(q)}`;
            suggestionsList.style.display = 'none';
        }

        // YouTube API for Rewards
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                events: { 'onStateChange': (e) => { 
                    if(e.data == YT.PlayerState.ENDED) {
                        coins += 50; updateUI(); 
                        showPopup("ဂုဏ်ယူပါတယ်! +50 Gold ရပါပြီ");
                    } 
                } }
            });
        }

        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise - Smart Music Player</title>
    <style>
        :root {
            --dreamy-blue: #a1c4fd;
            --creamy-white: #fff9f0;
            --glass: rgba(255, 255, 255, 0.4);
            --text-blue: #5a73a3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #fff9f0 100%);
            min-height: 100vh; color: #444; overflow-x: hidden;
        }

        /* Dashboards */
        #coin-display { position: fixed; top: 15px; right: 15px; background: var(--glass); padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #b8860b; border: 1px solid white; backdrop-filter: blur(10px); z-index: 1000; }

        .section { width: 95%; max-width: 600px; margin: 40px auto; text-align: center; padding: 20px; }

        /* Smart Search UI */
        .search-box-container { position: relative; width: 100%; margin-bottom: 20px; }
        
        input { 
            padding: 15px 25px; border-radius: 30px; border: 1px solid white; 
            width: 100%; outline: none; background: var(--glass);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 1rem;
        }

        #suggestions-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; border-radius: 15px; margin-top: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 200px; overflow-y: auto; z-index: 2000;
            display: none; list-style: none; border: 1px solid #eee;
        }

        #suggestions-list li {
            padding: 12px 20px; cursor: pointer; text-align: left;
            border-bottom: 1px solid #f9f9f9; transition: 0.2s;
        }

        #suggestions-list li:hover { background: #f0f7ff; color: var(--text-blue); }

        /* Video Area */
        .video-container { 
            background: #000; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); position: relative;
            padding-bottom: 56.25%; height: 0;
        }
        
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        button { 
            padding: 12px 30px; border-radius: 25px; border: none; 
            background: var(--text-blue); color: white; font-weight: bold; 
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        button:hover { background: #4a5f8a; transform: translateY(-2px); }

        #yt-link-btn {
            display: none; background: #ff0000; margin-top: 10px; text-decoration: none;
            color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; font-weight: bold;
        }

        #popup {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #2ecc71; color: white; padding: 12px 25px; border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.5s; z-index: 9999;
        }
        #popup.show { top: 20px; }
    </style>
</head>
<body>

    <div id="popup">ဂုဏ်ယူပါတယ်! Gold ရပါပြီ ✨</div>
    <div id="coin-display">✨🪙 Gold: <span id="coin-val">0</span></div>

    <div class="section">
        <h1 style="color: var(--text-blue); margin-bottom: 10px;">Paradise Music</h1>
        <p style="color: #666; margin-bottom: 30px;">သီချင်းအမည်ရိုက်ပြီး YouTube မှာပေါ်သလို ရှာဖွေပါ</p>

        <div class="search-box-container">
            <input type="text" id="search-input" placeholder="သီချင်းရှာရန်..." autocomplete="off">
            <ul id="suggestions-list"></ul>
            <button onclick="searchVideo()">Search Music</button>
        </div>

        <div class="video-container">
            <iframe id="main-player" src="https://www.youtube.com/embed?enablejsapi=1&listType=search&list=relaxing+music"></iframe>
        </div>

        <a id="yt-link-btn" target="_blank">ဖွင့်မရလျှင် YouTube တွင် တိုက်ရိုက်ကြည့်ရန် ↗️</a>
    </div>

    <script>
        let gold = parseInt(localStorage.getItem('p_gold')) || 0;
        const input = document.getElementById('search-input');
        const list = document.getElementById('suggestions-list');
        const player = document.getElementById('main-player');
        const ytLink = document.getElementById('yt-link-btn');

        function updateUI() { document.getElementById('coin-val').innerText = gold; localStorage.setItem('p_gold', gold); }
        updateUI();

        // 1. YouTube Autocomplete API (YouTube အတိုင်း Suggestions ပြရန်)
        input.addEventListener('input', function() {
            if (this.value.length < 2) { list.style.display = 'none'; return; }

            const script = document.createElement('script');
            script.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(this.value)}&callback=handleResults`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        });

        window.handleResults = function(data) {
            const results = data[1];
            list.innerHTML = '';
            if (results.length > 0) {
                list.style.display = 'block';
                results.forEach(res => {
                    const li = document.createElement('li');
                    li.innerText = res[0];
                    li.onclick = () => { input.value = res[0]; list.style.display = 'none'; searchVideo(); };
                    list.appendChild(li);
                });
            }
        };

        // 2. Search Function
        function searchVideo() {
            const query = input.value;
            if (!query) return;
            const embedUrl = `https://www.youtube.com/embed?enablejsapi=1&listType=search&list=${encodeURIComponent(query)}&origin=${window.location.origin}`;
            player.src = embedUrl;
            list.style.display = 'none';

            // ဖွင့်မရတဲ့ ဗီဒီယိုတွေအတွက် YouTube Link ခလုတ်ကို ပြပေးခြင်း
            ytLink.style.display = 'inline-block';
            ytLink.href = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
        }

        // 3. YouTube API for Reward (ဗီဒီယိုဆုံးလျှင် Gold ပေးရန်)
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('main-player', {
                events: { 'onStateChange': (e) => { 
                    if(e.data == YT.PlayerState.ENDED) {
                        gold += 50; updateUI(); 
                        const p = document.getElementById('popup');
                        p.classList.add('show');
                        setTimeout(() => p.classList.remove('show'), 3000);
                    } 
                } }
            });
        }

        // အပြင်ဘက်နှိပ်ရင် List ပိတ်ရန်
        document.addEventListener('click', (e) => { if (e.target !== input) list.style.display = 'none'; });
    </script>
</body>
</html>

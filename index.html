<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise - Level Up Experience</title>
    <style>
        :root {
            --dreamy-blue: #a1c4fd;
            --creamy-white: #fff9f0;
            --glass: rgba(255, 255, 255, 0.4);
            --text-blue: #5a73a3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }

        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #fff9f0 100%);
            min-height: 100vh; color: #444; overflow-x: hidden;
        }

        /* --- UI Elements --- */
        #coin-display { position: fixed; top: 15px; right: 15px; background: var(--glass); padding: 10px 20px; border-radius: 25px; font-weight: bold; color: #b8860b; border: 1px solid white; backdrop-filter: blur(10px); z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #achieve-btn { position: fixed; top: 15px; left: 15px; background: var(--glass); padding: 10px 20px; border-radius: 25px; font-weight: bold; color: var(--text-blue); cursor: pointer; border: 1px solid white; backdrop-filter: blur(10px); z-index: 1000; }
        #cheat-btn { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--glass); border-radius: 50%; display: none; justify-content: center; align-items: center; cursor: pointer; border: 1px solid white; z-index: 1000; font-size: 1.2rem; }

        /* --- Sections --- */
        .page-section { display: none; width: 95%; max-width: 700px; margin: 70px auto; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Lock Screen */
        #lock-screen { position: fixed; inset: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .lock-box { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 85%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* Main Menu */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .menu-card { background: var(--glass); border: 1px solid white; padding: 30px; border-radius: 25px; cursor: pointer; transition: 0.3s; font-weight: bold; backdrop-filter: blur(5px); }
        .menu-card:hover { background: white; transform: scale(1.05); }

        /* Music Search UI */
        .search-container { position: relative; margin-bottom: 20px; }
        #suggestions {
            position: absolute; top: 100%; left: 0; right: 0; background: white; 
            border-radius: 15px; margin-top: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 200px; overflow-y: auto; z-index: 2000; display: none; list-style: none; text-align: left;
        }
        #suggestions li { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        #suggestions li:hover { background: #f0f7ff; }

        /* Video & Player */
        .video-box { background: #000; border-radius: 25px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Forms & Buttons */
        input { padding: 15px; border-radius: 25px; border: 1px solid #ddd; width: 100%; margin: 10px 0; outline: none; text-align: center; font-size: 1rem; }
        button { padding: 15px; border-radius: 25px; border: none; background: var(--text-blue); color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .back-btn { background: #ff7675; margin-top: 20px; }

        /* Notifications & Modals */
        #popup-notify { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.5s; z-index: 9000; font-weight: bold; border: 2px solid #2ecc71; text-align: center; min-width: 250px; }
        #popup-notify.show { top: 30px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 6000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--creamy-white); padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        
        .rank-legendary { color: #8e44ad; animation: glow 1s infinite alternate; font-weight: bold; }
        @keyframes glow { from { text-shadow: 0 0 5px #8e44ad; } to { text-shadow: 0 0 15px #8e44ad; } }
    </style>
</head>
<body>

    <div id="popup-notify"></div>

    <div id="coin-display">✨🪙 Gold: <span id="gold-val">0</span></div>
    <div id="achieve-btn" onclick="showAchieve()" style="display:none;">🏆 Rank</div>
    <div id="cheat-btn" onclick="showCheat()">⚙️</div>

    <div id="lock-screen">
        <div class="lock-box">
            <h2 style="margin-bottom:15px;">Paradise Login</h2>
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="checkLogin()">Login</button>
        </div>
    </div>

    <div id="home-page" class="page-section">
        <h1 style="color: var(--text-blue); font-size: 2.2rem;">Welcome to Paradise</h1>
        <p id="greet-text" style="font-style: italic; color: #666; margin-top: 10px;"></p>
        <div class="menu-grid">
            <div class="menu-card" onclick="navTo('music-page')">🎵<br>Music Player</div>
            <div class="menu-card" onclick="navTo('game-page')">🎮<br>Mini Games</div>
        </div>
    </div>

    <div id="music-page" class="page-section">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="YouTube မှာလို ရှာဖွေပါ..." autocomplete="off">
            <ul id="suggestions"></ul>
            <button onclick="doSearch()" style="margin-top:10px;">Search</button>
        </div>
        <div class="video-box">
            <iframe id="main-player" src="https://www.youtube.com/embed?enablejsapi=1&listType=search&list=relaxing+music"></iframe>
        </div>
        <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">*ဗီဒီယိုအဆုံးထိကြည့်ပါက Gold +50 ရရှိပါမည်*</p>
        <button class="back-btn" onclick="navTo('home-page')">Back to Menu</button>
    </div>

    <div id="game-page" class="page-section">
        <div id="game-menu">
            <button onclick="startMath()" style="background:#a1c4fd; margin-bottom:15px;">➕ Math Quiz (+20 Gold)</button>
            <button onclick="startWord()" style="background:#fbc2eb; color:#444;">🔤 Word Guess (+20 Gold)</button>
            <button class="back-btn" onclick="navTo('home-page')">Back</button>
        </div>

        <div id="math-arena" style="display:none; background:white; padding:30px; border-radius:25px;">
            <h2 id="m-ques" style="font-size:2rem; margin-bottom:15px;"></h2>
            <input type="number" id="m-ans" placeholder="အဖြေရိုက်ပါ">
            <button onclick="checkMath()">Submit</button>
        </div>

        <div id="word-arena" style="display:none; background:white; padding:30px; border-radius:25px;">
            <p id="w-hint" style="color:#999; margin-bottom:5px;"></p>
            <h2 id="w-scram" style="letter-spacing:10px; color:var(--text-blue); margin-bottom:15px;"></h2>
            <input type="text" id="w-ans" placeholder="မှန်ကန်သော စာလုံးရိုက်ပါ">
            <button onclick="checkWord()">Submit</button>
        </div>
    </div>

    <div id="rank-modal" class="modal">
        <div class="modal-content">
            <h2 id="current-rank-title">Rank Status</h2>
            <div id="rank-list" style="margin: 20px 0; text-align: left; padding-left: 20px;"></div>
            <button onclick="closeModal('rank-modal')">Close</button>
        </div>
    </div>

    <div id="cheat-modal" class="modal">
        <div class="modal-content">
            <div id="cheat-s1">
                <h3>Admin Key</h3>
                <input type="password" id="cheat-key" placeholder="Enter Secret Key">
                <button onclick="verifyCheat()">Verify</button>
            </div>
            <div id="cheat-s2" style="display:none;">
                <input type="number" id="cheat-amt" placeholder="Amount (20-1000)">
                <button onclick="applyCheat()">Add Gold</button>
            </div>
            <button class="back-btn" onclick="closeModal('cheat-modal')">Cancel</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let gold = parseInt(localStorage.getItem('paradise_gold')) || 0;
        let lastRank = "";
        const greets = ["ဒီနေ့ စိတ်ပျော်ရွှင်ပါစေ ✨", "Paradise မှ ကြိုဆိုပါတယ် 🌿", "သီချင်းလေးနားထောင်ရင်း အနားယူပါ ☁️"];

        // --- Core Functions ---
        function notify(msg, color="#2ecc71") {
            const p = document.getElementById('popup-notify');
            p.innerText = msg; p.style.borderColor = color;
            p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 3000);
        }

        function updateGold() {
            document.getElementById('gold-val').innerText = gold;
            localStorage.setItem('paradise_gold', gold);
            checkRankUp(true);
        }

        function addGold(amt) {
            gold += amt;
            updateGold();
            notify(`ဂုဏ်ယူပါတယ်! Gold +${amt} ရပါပြီ ✨`);
        }

        function checkLogin() {
            if(document.getElementById('login-pass').value === '12122026') {
                document.getElementById('lock-screen').style.display = 'none';
                navTo('home-page');
                document.getElementById('achieve-btn').style.display = 'block';
                document.getElementById('cheat-btn').style.display = 'flex';
                document.getElementById('greet-text').innerText = greets[Math.floor(Math.random()*greets.length)];
                checkRankUp(false);
                updateGold();
            } else { alert("စကားဝှက် မှားယွင်းနေပါသည်။"); }
        }

        function navTo(id) {
            document.querySelectorAll('.page-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'game-page') {
                document.getElementById('game-menu').style.display = 'block';
                document.getElementById('math-arena').style.display = 'none';
                document.getElementById('word-arena').style.display = 'none';
            }
        }

        // --- Rank System ---
        function getRank(c) {
            if(c <= 200) return "Bronze";
            if(c <= 400) return "Silver";
            if(c <= 600) return "Gold";
            if(c <= 800) return "VIP";
            if(c <= 1000) return "VVIP";
            return "Legendary";
        }

        function checkRankUp(isNotify) {
            let current = getRank(gold);
            if(current !== lastRank) {
                if(isNotify && lastRank !== "") notify(`ဂုဏ်ယူပါတယ်! ${current} အဆင့်သို့ရောက်ပါပြီ! 🏆`);
                lastRank = current;
            }
        }

        // --- Music & YouTube Search ---
        const sInput = document.getElementById('search-input');
        const sList = document.getElementById('suggestions');

        sInput.addEventListener('input', function() {
            if (this.value.length < 2) { sList.style.display = 'none'; return; }
            const script = document.createElement('script');
            script.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(this.value)}&callback=handleSuggest`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        });

        window.handleSuggest = function(data) {
            const res = data[1];
            sList.innerHTML = '';
            if(res.length > 0) {
                sList.style.display = 'block';
                res.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item[0];
                    li.onclick = () => { sInput.value = item[0]; sList.style.display = 'none'; doSearch(); };
                    sList.appendChild(li);
                });
            }
        };

        function doSearch() {
            const q = sInput.value; if(!q) return;
            const origin = window.location.origin;
            document.getElementById('main-player').src = `https://www.youtube.com/embed?enablejsapi=1&origin=${origin}&listType=search&list=${encodeURIComponent(q)}`;
            sList.style.display = 'none';
        }

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('main-player', {
                events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) addGold(50); } }
            });
        }

        // --- Mini Games (Teen Friendly) ---
        let mCorrect, wCorrect;
        function startMath() {
            document.getElementById('game-menu').style.display = 'none';
            document.getElementById('math-arena').style.display = 'block';
            let n1 = Math.floor(Math.random()*50), n2 = Math.floor(Math.random()*50);
            mCorrect = n1 + n2;
            document.getElementById('m-ques').innerText = `${n1} + ${n2} = ?`;
        }
        function checkMath() {
            if(document.getElementById('m-ans').value == mCorrect) { addGold(20); startMath(); }
            document.getElementById('m-ans').value = "";
        }

        const words = [
            {w:'galaxy', h:'ကြယ်တာရာများ'}, {w:'soccer', h:'ဘောလုံးအားကစား'}, 
            {w:'nature', h:'သဘာဝအလှတရား'}, {w:'island', h:'ကျွန်းလေး'},
            {w:'camera', h:'ဓာတ်ပုံရိုက်ကိရိယာ'}, {w:'music', h:'သီချင်း'}
        ];
        function startWord() {
            document.getElementById('game-menu').style.display = 'none';
            document.getElementById('word-arena').style.display = 'block';
            let obj = words[Math.floor(Math.random()*words.length)];
            wCorrect = obj.w;
            document.getElementById('w-hint').innerText = "Hint: " + obj.h;
            document.getElementById('w-scram').innerText = wCorrect.split('').sort(()=>.5-Math.random()).join('').toUpperCase();
        }
        function checkWord() {
            if(document.getElementById('w-ans').value.toLowerCase() == wCorrect) { addGold(20); startWord(); }
            document.getElementById('w-ans').value = "";
        }

        // --- Modals Logic ---
        function showAchieve() {
            let r = getRank(gold);
            document.getElementById('current-rank-title').innerText = r + " Rank";
            document.getElementById('current-rank-title').className = (r === "Legendary") ? "rank-legendary" : "";
            document.getElementById('rank-list').innerHTML = `
                <div style="margin:5px 0;">🥉 Bronze (0-200) ${gold>0?'✅':''}</div>
                <div style="margin:5px 0;">🥈 Silver (201-400) ${gold>200?'✅':''}</div>
                <div style="margin:5px 0;">🥇 Gold (401-600) ${gold>400?'✅':''}</div>
                <div style="margin:5px 0;">💎 VIP (601-800) ${gold>600?'✅':''}</div>
                <div style="margin:5px 0;">🔥 VVIP (801-1000) ${gold>800?'✅':''}</div>
                <div style="margin:5px 0; color:#8e44ad">✨ Legendary (1001+) ${gold>1000?'✅':''}</div>
            `;
            document.getElementById('rank-modal').style.display = 'flex';
        }

        function showCheat() { document.getElementById('cheat-modal').style.display = 'flex'; }
        function verifyCheat() {
            if(document.getElementById('cheat-key').value === 'htet2002') {
                document.getElementById('cheat-s1').style.display = 'none';
                document.getElementById('cheat-s2').style.display = 'block';
            } else { alert("Wrong Secret Key!"); }
        }
        function applyCheat() {
            let a = parseInt(document.getElementById('cheat-amt').value);
            if(a >= 20 && a <= 1000) { addGold(a); closeModal('cheat-modal'); }
            else { alert("20 မှ 1000 အတွင်းသာ!"); }
        }

        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'cheat-modal') {
                document.getElementById('cheat-s1').style.display = 'block';
                document.getElementById('cheat-s2').style.display = 'none';
                document.getElementById('cheat-key').value = "";
            }
        }

        document.addEventListener('click', (e) => { if (e.target !== sInput) sList.style.display = 'none'; });
    </script>
</body>
</html>

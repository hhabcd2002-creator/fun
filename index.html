<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise - MP3 Player</title>
    <style>
        :root {
            --dreamy-blue: #a1c4fd;
            --creamy-white: #fff9f0;
            --text-blue: #5a73a3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #fff9f0 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        #coin-display { position: fixed; top: 15px; right: 15px; background: rgba(255,255,255,0.5); padding: 10px 20px; border-radius: 25px; font-weight: bold; color: #b8860b; border: 1px solid white; backdrop-filter: blur(10px); }

        .container { width: 95%; max-width: 500px; margin-top: 80px; text-align: center; }

        /* Search Box */
        .search-area { position: relative; margin-bottom: 30px; }
        input { padding: 15px 25px; border-radius: 30px; border: 2px solid white; width: 100%; outline: none; background: rgba(255,255,255,0.8); font-size: 1rem; }

        /* SoundCloud Player Wrapper */
        .player-wrapper { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; 
            min-height: 166px; border: 1px solid #eee;
        }

        button { 
            padding: 15px 40px; border-radius: 30px; border: none; 
            background: var(--text-blue); color: white; font-weight: bold; 
            cursor: pointer; margin-top: 15px; font-size: 1rem;
        }

        #status-msg { margin-top: 15px; color: #777; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="coin-display">✨🪙 Gold: <span id="gold-val">0</span></div>

    <div class="container">
        <h1 style="color: var(--text-blue); margin-bottom: 10px;">Paradise MP3</h1>
        <p style="color: #666; margin-bottom: 25px;">SoundCloud မှ သီချင်းများကို နားထောင်ပါ</p>

        <div class="search-area">
            <input type="text" id="music-input" placeholder="သီချင်းအမည် သို့မဟုတ် Link ကိုထည့်ပါ...">
            <button onclick="playMusic()">Play Music</button>
        </div>

        <div class="player-wrapper">
            <iframe id="sc-player" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293&color=%235a73a3&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true">
            </iframe>
        </div>

        <div id="status-msg">သီချင်းနားထောင်ပြီး Gold စုဆောင်းပါ</div>
    </div>

    <script>
        let gold = parseInt(localStorage.getItem('p_gold_mp3')) || 0;
        document.getElementById('gold-val').innerText = gold;

        function playMusic() {
            let query = document.getElementById('music-input').value;
            if(!query) return;

            const player = document.getElementById('sc-player');
            
            // အကယ်၍ link ထည့်ရင် link အတိုင်းဖွင့်မယ်၊ စာရိုက်ရင် search အနေနဲ့ သုံးမယ်
            let targetUrl;
            if(query.includes("soundcloud.com")) {
                targetUrl = query;
            } else {
                // SoundCloud Search result က YouTube လောက် direct မဖြစ်လို့ link သုံးတာ အကောင်းဆုံးပါ
                // ဒါပေမယ့် အဆင်ပြေအောင် အနီးစပ်ဆုံး track တစ်ခုကို ညွှန်ပေးထားပါတယ်
                alert("SoundCloud သီချင်း Link ကို ထည့်သွင်းပေးရင် ပိုမိုမြန်ဆန်ပါတယ်!");
                targetUrl = `https://soundcloud.com/search?q=${encodeURIComponent(query)}`;
            }

            player.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(targetUrl)}&color=%235a73a3&auto_play=true`;
            
            // Music စဖွင့်ရင် Gold ၁၀ ခု လက်ဆောင်ပေးမယ်
            gold += 10;
            document.getElementById('gold-val').innerText = gold;
            localStorage.setItem('p_gold_mp3', gold);
        }

        // SoundCloud API နဲ့ သီချင်းဆုံးမဆုံး စစ်ဆေးဖို့အတွက် Widget API လိုအပ်ပါတယ်
    </script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script>
        // သီချင်းဆုံးသွားရင် Gold ပေါင်းပေးဖို့ Logic
        var iframeElement = document.querySelector('iframe');
        var widget = SC.Widget(iframeElement);

        widget.bind(SC.Widget.Events.FINISH, function() {
            gold += 40;
            document.getElementById('gold-val').innerText = gold;
            localStorage.setItem('p_gold_mp3', gold);
            alert("သီချင်းနားထောင်ပြီးလို့ Gold 40 ထပ်မံရရှိပါတယ်! ✨");
        });
    </script>
</body>
</html>
